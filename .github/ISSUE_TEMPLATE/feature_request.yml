name: Feature request
description: Suggest a new scanner, integration, output format, or risk rule.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should AgentRadar do?
    validations:
      required: true
